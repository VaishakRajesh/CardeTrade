{% extends 'base.html' %}
{% load static %}

{% block title %}Register Farm - CardeTrade{% endblock %}

{% block content %}
<div class="auth-wrapper-premium" style="min-height:auto;padding:7rem 0 3rem;">
    <div class="auth-bg-premium">
        <img src="{% static 'image/cardamom2.jpg' %}" alt="" onerror="this.style.display='none'">
    </div>
    <div class="auth-card-premium auth-card-premium-wide">
        <div class="auth-logo-premium">
            <div class="logo-img-wrapper">
                <img src="{% static 'image/cardamom1.jpg' %}" alt="" onerror="this.style.display='none'">
            </div>
            <h3>Register Your Farm</h3>
            <p>Add your cardamom farm to start creating batches</p>
        </div>
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="fw-semibold small">Farm Name *</label>
                    <input type="text" name="farm_name" class="form-premium" placeholder="e.g. Green Valley Farm" required>
                </div>
                <div class="col-md-6">
                    <label class="fw-semibold small">Total Area (acres)</label>
                    <input type="number" name="total_area_acres" step="0.01" class="form-premium" placeholder="e.g. 5.5">
                </div>
                <div class="col-md-6">
                    <label class="fw-semibold small">Location</label>
                    <input type="text" name="location" class="form-premium" placeholder="e.g. Kattappana">
                </div>
                <div class="col-md-6">
                    <label class="fw-semibold small">Region</label>
                    <input type="text" name="region" class="form-premium" placeholder="e.g. Idukki, Kerala">
                </div>
                <div class="col-12">
                    <label class="fw-semibold small">Certification</label>
                    <input type="text" name="certification" class="form-premium" placeholder="e.g. Organic, Fair Trade">
                </div>
            </div>
            <button type="submit" class="btn-premium btn-premium-primary w-100 justify-content-center mt-4">
                <i class="bi bi-check-lg"></i> Register Farm
            </button>
        </form>
    </div>
</div>
{% endblock %}
